version: '3.8'
services:
  qltc-db:
    image: mysql:8.0
    container_name: qltc-mysql
    environment:
      MYSQL_DATABASE: qltc_db
      MYSQL_USER: qltc_user
      MYSQL_PASSWORD: qltc_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3308:3306"
    volumes:
      - qltc_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qltc_mysql_data: