version: '3.8'
services:
  qltc-db:
    image: mysql:8.0
    container_name: qltc-mysql
    environment:
      MYSQL_DATABASE: qltc_db
      MYSQL_USER: qltc_user
      MYSQL_PASSWORD: qltc_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3308:3306"
    volumes:
      - qltc_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  qltc-backend:
    build:
      context: ./qltc-backend
      dockerfile: Dockerfile
    container_name: qltc-backend
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://qltc-db:3306/qltc_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: qltc_user
      SPRING_DATASOURCE_PASSWORD: qltc_password
    depends_on:
      qltc-db:
        condition: service_healthy
    restart: on-failure

  qltc-frontend:
    build:
      context: ./qltc-frontend
      dockerfile: Dockerfile
    container_name: qltc-frontend
    ports:
      - "5173:80"
    depends_on:
      - qltc-backend
    restart: on-failure

volumes:
  qltc_mysql_data: